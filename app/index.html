<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TOEIC Part 5 Quiz</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="page" id="page">
      <header class="hero">
        <p class="eyebrow">TOEIC Part 5 Practice</p>
        <h1>1問ずつ、すぐ確認。</h1>
        <p class="lead">
          ランダム出題された Part 5 形式の問題に答え、その場で正誤と解説を確認します。
        </p>
      </header>

      <section class="card landing-card" aria-labelledby="landing-title">
        <div class="actions">
          <button type="button" class="button button-primary button-large" id="start-practice">
            問題を始める
          </button>
        </div>
      </section>

      <section class="card practice-card" id="practice-screen" hidden>
        <div id="app" class="practice-panel" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
